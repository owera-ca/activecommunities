name: CI & Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────────
  # Job 1 – Run unit tests
  # ──────────────────────────────────────────────
  python-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create minimal .env for tests
        run: |
          cat > .env << 'EOF'
          AC_EMAIL=test@example.com
          AC_PASSWORD=testpass
          AC_BASE_URL=https://anc.ca.apm.activecommunities.com/toronto
          AC_ACTIVITY_NAME=Ultra Swim 6
          AC_CENTER_ID=131
          AC_MIN_SPOTS=1
          AC_CHECK_INTERVAL=300
          AC_MAX_RETRIES=3
          TELEGRAM_BOT_TOKEN=
          TELEGRAM_CHAT_ID=
          EOF

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # Job 2 – Deploy (only on push to main, after tests pass)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: python-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSHKEY }}
          script: "cd /var/www/activecommunities && bash deploy.sh"
